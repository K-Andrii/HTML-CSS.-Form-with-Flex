<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HTML + CSS. Form with Flex</title>
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>
    <main>
        <form action="#">
            <h2 class="main-tittle">Create an account</h2>
            <p class="sub-title">We always keep your name and email address private.</p>

            <div class="inputs-section">
                <div class="inputs-container">
                    <input type="text" id="first-name" placeholder="First name" required>
                    <input type="text" id="last-name" placeholder="Last name" required>
                </div>
                <div class="inputs-container">
                    <input type="text" id="display-name" placeholder="Display Name" required>
                    <input type="email" id="email" placeholder="Email Addres" required>
                </div>
                <div class="inputs-container">
                    <input type="password" id="password" placeholder="Password" required>
                    <input type="password" id="password-confirm" placeholder="Password Confirmation" required>
                </div>
            </div>

            <div class="radio-container">
                <div class="radio-item">
                    <input type="radio" name="join" id="buyer" checked>
                    <div class="radio-text">
                        <label class="radio-title" for="buyer">Join As a Buyer</label>
                        <p class="radio-description">I am looking for a Name, Logo or Tagline for my business, brand or product.</p>
                    </div>
                </div>

                <div class="radio-item">
                    <input type="radio" name="join" id="seller">
                    <div class="radio-text">
                        <label class="radio-title" for="seller">Join As a Creative or Marketplace Seller</label>
                        <p class="radio-description">I plan to submit name ideas, Logo designs or sell names in Domain Marketplace.</p>
                    </div>
                </div>
            </div>

            <div class="checkbox-container">
                <input type="checkbox" name="allow-offers" id="allow-offers">
                <label for="allow-offers">Allow Squadhelp to send marketing/promotional offers from time to time</label>
            </div>

            <button type="submit">Create account</button>
        </form>
    </main>
</body>
</html>
